
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <title>Verify Email - SIRIP JUARA</title>
    <link rel="stylesheet" href="./login.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
    />
  </head>
  <body>
    <div class="verify-container">
      <!-- Back Button -->
      <button class="verify-back-button" onclick="window.history.back()">
        <svg
          width="35"
          height="35"
          viewBox="0 0 35 35"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M18.5 7.5L8 17.5L18.5 27.5"
            stroke="#33363F"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      <!-- Verify Card -->
      <div class="verify-card">
        <h1 class="verify-title">Verify Your Email</h1>
        <p class="verify-description" id="verifyDescription">
          Please enter the 4 Digit Code Sent to stasmaulkhusna@gmail.com
        </p>

        <!-- OTP Inputs -->
        <div class="otp-inputs-container">
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            inputmode="numeric"
            placeholder=""
            data-index="0"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            inputmode="numeric"
            placeholder=""
            data-index="1"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            inputmode="numeric"
            placeholder=""
            data-index="2"
          />
          <input
            type="text"
            class="otp-input"
            maxlength="1"
            inputmode="numeric"
            placeholder=""
            data-index="3"
          />
        </div>

        <!-- Resend Code Link -->
        <a href="#" class="resend-code-link">Resend Code</a>

        <!-- Verify Button -->
        <button class="verify-btn" onclick="handleVerify()">Verify</button>
      </div>
    </div>

    <script>
      const otpInputs = document.querySelectorAll(".otp-input");

      // OTP input handling
      otpInputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
          const value = e.target.value;

          // Allow only numbers
          if (!/^\d*$/.test(value)) {
            e.target.value = "";
            return;
          }

          // Move to next input
          if (value && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          // Handle backspace
          if (e.key === "Backspace") {
            if (!input.value && index > 0) {
              otpInputs[index - 1].focus();
            }
          }
          // Handle arrow keys
          else if (e.key === "ArrowLeft" && index > 0) {
            otpInputs[index - 1].focus();
          } else if (e.key === "ArrowRight" && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });

        input.addEventListener("paste", (e) => {
          e.preventDefault();
          const pastedData = e.clipboardData.getData("text");
          const digits = pastedData.replace(/\D/g, "");

          digits.forEach((digit, i) => {
            if (index + i < otpInputs.length) {
              otpInputs[index + i].value = digit;
            }
          });

          if (digits.length > 0) {
            const nextIndex = Math.min(index + digits.length, otpInputs.length - 1);
            otpInputs[nextIndex].focus();
          }
        });
      });

      function handleVerify() {
        const code = Array.from(otpInputs).map((input) => input.value).join("");

        if (code.length !== 4) {
          alert("Please enter all 4 digits");
          return;
        }

        console.log("Verifying code:", code);
        alert("Code verified: " + code);
        // Add your backend API call here
      }

      // Set focus on first input when page loads
      otpInputs[0].focus();
    </script>
  </body>
</html>
