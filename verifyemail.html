<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - SIRIP JUARA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset dan base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #3b5380 0%, #2d4168 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Container utama */
    .verify-container {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Card putih */
    .verify-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 50px 60px;
      width: 100%;
      max-width: 800px;
      min-height: 480px;
      position: relative;
      box-shadow: 0px 4px 2px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    /* Tombol back */
    .back-button {
      position: absolute;
      top: 34px;
      left: 26px;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }

    .back-button:hover {
      opacity: 0.7;
    }

    .back-arrow {
      font-size: 26px;
      color: #3b5380;
      line-height: 1;
      font-weight: 700;
      display: inline-block;
      transform: translateX(-1px);
    }

    /* Judul */
    .verify-title {
      font-size: 28px;
      font-weight: 700;
      color: #3b5380;
      text-align: center;
      margin: 0 0 20px 0;
    }

    /* Deskripsi */
    .verify-description {
      font-size: 16px;
      font-weight: 400;
      color: #3b5380;
      text-align: center;
      margin: 0 0 40px 0;
      max-width: 500px;
      line-height: 1.4;
    }

    /* Email highlight */
    .email-highlight {
      color: #3b5380;
      font-weight: 600;
    }

    /* Form verifikasi */
    .verify-form {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Input code container */
    .code-inputs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      justify-content: center;
    }

    .code-input {
      width: 70px;
      height: 70px;
      border: 1px solid #000000;
      border-radius: 20px;
      background: #f5f5f5;
      font-size: 24px;
      font-weight: 600;
      color: #3b5380;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Poppins';
    }

    .code-input:focus {
      outline: none;
      border-color: #3b5380;
      box-shadow: 0 0 0 3px rgba(59, 83, 128, 0.1);
    }

    /* Resend link */
    .resend-link {
      font-size: 14px;
      color: #3b5380;
      text-decoration: none;
      margin-bottom: 20px;
      margin-left: 240px;
      transition: color 0.2s;
      transform: translateY(-20px);
    }

    .resend-link:hover {
      color: #2d4168;
      text-decoration: underline;
    }

    /* Tombol verify */
    .btn-verify {
      width: 100%;
      max-width: 350px;
      height: 50px;
      border-radius: 30px;
      background: #3b5380;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      border: 1px solid #000000;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      margin-top: 10px;
      font-family: 'Poppins';
    }

    .btn-verify:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .btn-verify:active {
      transform: translateY(0);
    }

    /* Responsive Design */
    @media (max-width: 1024px) {
      body {
        padding: 15px;
      }

      .verify-card {
        padding: 40px 50px;
        max-width: 700px;
        min-height: 420px;
      }

      .verify-title {
        font-size: 28px;
      }

      .verify-description {
        font-size: 16px;
      }

      .code-inputs {
        gap: 12px;
      }

      .code-input {
        width: 65px;
        height: 65px;
        font-size: 22px;
      }

      .btn-verify {
        height: 45px;
        font-size: 16px;
        max-width: 300px;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .verify-card {
        padding: 35px 25px;
        max-width: 100%;
        min-height: 380px;
      }

      .back-button {
        top: 20px;
        left: 15px;
      }

      .verify-title {
        font-size: 26px;
      }

      .verify-description {
        font-size: 15px;
        margin-bottom: 25px;
      }

      .code-inputs {
        gap: 10px;
      }

      .code-input {
        width: 60px;
        height: 60px;
        font-size: 20px;
      }

      .resend-link {
        font-size: 13px;
      }

      .btn-verify {
        height: 43px;
        font-size: 15px;
        max-width: 280px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 5px;
      }

      .verify-card {
        padding: 25px 20px;
        min-height: 350px;
      }

      .verify-title {
        font-size: 22px;
      }

      .verify-description {
        font-size: 13px;
      }

      .code-inputs {
        gap: 8px;
      }

      .code-input {
        width: 55px;
        height: 55px;
        font-size: 18px;
      }

      .resend-link {
        font-size: 12px;
      }

      .btn-verify {
        height: 40px;
        font-size: 13px;
        max-width: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="verify-container">
    <!-- White Card -->
    <div class="verify-card">
      <!-- Back Button -->
      <a href="forgot.html" class="back-button">
        <span class="back-arrow">&lt;</span>
      </a>

      <!-- Title -->
      <h1 class="verify-title">Verify Your Email</h1>

      <!-- Description -->
      <p class="verify-description">
        Please enter the 4 Digit Code Sent to<br>
        <span class="email-highlight">stasmaulkhusna@gmail.com</span>
      </p>

      <!-- Form -->
      <form class="verify-form" onsubmit="window.location.href='resetpass.html'; return false;">
        <!-- Code Inputs -->
        <div class="code-inputs">
          <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="code-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
        </div>

        <!-- Resend Link -->
        <a href="#" class="resend-link">Resend Code</a>

        <!-- Verify Button -->
        <button type="submit" class="btn-verify">Verify</button>
      </form>
    </div>
  </div>

  <script src="scripts.js"></script>
  <script>
    // Auto-focus dan navigation untuk input code
    document.addEventListener('DOMContentLoaded', function() {
      const codeInputs = document.querySelectorAll('.code-input');

      codeInputs.forEach((input, index) => {
        input.addEventListener('input', function(e) {
          // Hanya izinkan angka
          this.value = this.value.replace(/[^0-9]/g, '');

          // Auto move ke next input
          if (this.value.length === 1 && index < codeInputs.length - 1) {
            codeInputs[index + 1].focus();
          }
        });

        input.addEventListener('keydown', function(e) {
          // Backspace navigation
          if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
            codeInputs[index - 1].focus();
          }
        });

        input.addEventListener('paste', function(e) {
          e.preventDefault();
          const paste = (e.clipboardData || window.clipboardData).getData('text');
          const digits = paste.replace(/[^0-9]/g, '').slice(0, 4);

          digits.split('').forEach((digit, i) => {
            if (codeInputs[index + i]) {
              codeInputs[index + i].value = digit;
              if (index + i < codeInputs.length - 1) {
                codeInputs[index + i + 1].focus();
              }
            }
          });
        });
      });

      // Focus first input on load
      codeInputs[0].focus();
    });
  </script>
</body>
</html>
