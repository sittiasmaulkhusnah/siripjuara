<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <title>Sign In - SIRIP JUARA</title>
  
  <style>
    .login-container {
    width: 100%;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    box-shadow: 0px 4px 2px rgba(0, 0, 0, 0.25);
    background: #ffffff;
    overflow: hidden;
    }

    /* Left Panel - Welcome Section */
    .login-left-panel {
    background: linear-gradient(135deg, #3b5380 0%, #2d4168 100%);
    padding: 30px 50px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    border-radius: 0 50px 50px 0;
    overflow: hidden;
    }

    .login-logo {
    display: inline-block;
    width: 130px;
    height: auto;
    margin-bottom: 30px;
    }

    .login-logo img {
    width: 100%;
    height: auto;
    margin-left: -30px;
    }

    .login-welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 60px;
    }

    .login-welcome h1 {
    font-family: 'Poppins';
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    margin: 0 0 16px 0;
    line-height: 1.1;
    }

    .welcome-subtitle {
    font-family: 'Poppins';
    font-size: 18px;
    font-weight: 400;
    color: #ffffff;
    margin: 0 0 1px 0;
    }

    .welcome-desc {
    font-family: 'Poppins';
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.9);
    margin: 0;
    line-height: 1.4;
    max-width: 570px;
    }

    .login-signup-prompt {
    text-align: center;
    margin-bottom: 15px;
    }

    .login-signup-prompt span {
    font-family: 'Poppins';
    font-size: 14px;
    font-weight: 100;
    color: rgba(255, 255, 255, 0.8);
    display: block;
    margin-bottom: 1px;
    }

    .signup-link {
    font-family: 'Poppins';
    font-size: 14px;
    font-weight: 400;
    color: #ffffff;
    text-decoration: none;
    cursor: pointer;
    display: inline-block;
    transition: opacity 0.2s;
    }

    .signup-link:hover {
    opacity: 0.8;
    }

    /* Right Panel - Sign In Form */
    .login-right-panel {
    background: #ffffff;
    padding: 40px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow-y: auto;
    max-height: 100vh;
    }

    .login-title {
    font-family: 'Poppins';
    font-size: 28px;
    font-weight: 700;
    color: #3b5380;
    text-align: center;
    margin: 0 0 25px 0;
    }

    .login-form {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    }

    .form-group {
    margin-bottom: 18px;
    }

    .form-group label {
    font-family: 'Poppins';
    font-size: 16px;
    font-weight: 400;
    color: #3b5380;
    display: block;
    margin-bottom: 3px;
    }

    .form-input {
    width: 100%;
    height: 50px;
    border: 1px solid #000000;
    border-radius: 30px;
    background: #f5f5f5;
    padding: 0 20px;
    font-family: 'Poppins';
    font-size: 15px;
    color: #3b5380;
    box-sizing: border-box;
    transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder {
    color: rgba(59, 83, 128, 0.5);
    }

    .form-input:focus {
    outline: none;
    border-color: #3b5380;
    box-shadow: 0 0 0 3px rgba(59, 83, 128, 0.1);
    }

    .password-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    }

    .password-input-wrapper input {
    width: 100%;
    }

    .toggle-password {
    position: absolute;
    right: 15px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    }

    .eye-icon {
    width: 20px;
    height: 20px;
    stroke: #3b5380;
    stroke-width: 2;
    fill: none;
    transition: opacity 0.2s;
    }

    .toggle-password:hover .eye-icon {
    opacity: 0.7;
    }

    .forgot-password {
    font-family: 'Poppins';
    font-size: 12px;
    font-weight: 300;
    color: #3b5380;
    text-decoration: none;
    display: block;
    text-align: right;
    margin-top: 5px;
    transition: opacity 0.2s;
    }

    .forgot-password:hover {
    opacity: 0.8;
    text-decoration: underline;
    }

    .btn-signin {
    width: 100%;
    height: 45px;
    border-radius: 30px;
    background: #3b5380;
    color: #ffffff;
    font-family: 'Poppins';
    font-size: 18px;
    font-weight: 700;
    border: 1px solid #000000;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
    margin-top: 30px;
    margin-bottom: 18px;
    }

    .btn-signin:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
    }

    .btn-signin:active {
    transform: translateY(0);
    }

    /* Divider with text */
    .divider-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0;
    }

    .divider-container::before,
    .divider-container::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #3b5380;
    }

    .divider-text {
    font-family: 'Poppins';
    font-size: 12px;
    font-weight: 300;
    color: #3b5380;
    white-space: nowrap;
    }

    /* Google Sign In Button */
    .btn-google {
    width: 37%;
    height: 48px;
    margin: 0 auto;
    border-radius: 35px;
    background: #f5f5f5;
    border: 1px solid #000000;
    font-family: 'Poppins';
    font-size: 13px;
    font-weight: 400;
    color: #3b5380;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 0.2s, transform 0.2s;
    }

    .btn-google:hover {
    background: #eeeeee;
    transform: translateY(-1px);
    }

    .btn-google img {
    width: 36px;
    height: 25px;
    }

    /* Responsive Design */
    @media (max-width: 1200px) {
    .login-left-panel {
        padding: 50px 40px;
    }

    .login-right-panel {
        padding: 50px 60px;
    }

    .login-welcome h1 {
        font-size: 40px;
    }

    .welcome-desc,
    .welcome-subtitle {
        font-size: 18px;
    }
    }

    @media (max-width: 768px) {
    .login-container {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
    }

    .login-left-panel {
        padding: 40px 30px;
        border-radius: 0 0 50px 50px;
        min-height: 40vh;
    }

    .login-right-panel {
        padding: 40px 25px;
        min-height: 60vh;
    }

    .login-welcome h1 {
        font-size: 32px;
    }

    .welcome-subtitle,
    .welcome-desc {
        font-size: 16px;
    }

    .login-title {
        font-size: 28px;
    }

    .form-group label {
        font-size: 16px;
    }

    .form-input {
        height: 55px;
        padding: 0 20px;
    }

    .btn-signin {
        height: 50px;
        font-size: 18px;
    }

    .btn-google {
        height: 48px;
        font-size: 13px;
    }
    }
    </style>

</head>
<body>
  <div class="login-container">
    <!-- Left Side -->
    <div class="login-left-panel">
      <a href="index.html" class="login-logo">
        <img src="png/Logo.png" alt="SIRIP JUARA Logo">
      </a>
      
      <div class="login-welcome">
        <h1>Hey There!</h1>
        <p class="welcome-subtitle">Welcome Back.</p>
        <p class="welcome-desc">Ready to check on your beautiful betta fish today?</p>
      </div>
      
      <div class="login-signup-prompt">
        <span>Don't have an account?</span>
        <a href="signup.html" class="signup-link">Create Account!</a>
      </div>
    </div>

    <!-- Right Side -->
    <div class="login-right-panel">
      <h2 class="login-title">Sign In</h2>
      
      <form class="login-form" action="#" method="POST">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="" required>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password *</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="" required>
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
              <svg viewBox="0 0 30 30" class="eye-icon">
                <g>
                  <path d="M15 8c-5 0-9 4-9 7s4 7 9 7 9-4 9-7-4-7-9-7z"/>
                  <circle cx="15" cy="15" r="3"/>
                </g>
              </svg>
            </button>
          </div>
          <a href="forgot.html" class="forgot-password">Forgot Password?</a>
        </div>

        <!-- Sign In Button -->
        <button type="button" class="btn-signin" onclick="window.location.href='index.html'">Sign In</button>

        <!-- Divider -->
        <div class="divider-container">
          <span class="divider-text">Or With Google</span>
        </div>

        <!-- Google Sign In Button -->
        <button type="button" class="btn-google">
          <img src="png/Google.png" alt="Google Icon">
          <span>Sign In with Google</span>
        </button>
      </form>
    </div>
  </div>

  <script src="scripts.js"></script>
  <script>
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-password');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.classList.add('active');
      } else {
        passwordInput.type = 'password';
        toggleBtn.classList.remove('active');
      }
    }
  // di signin.html, ubah form submitnya
  document.querySelector('.btn-signin').addEventListener('click', function() {
    localStorage.setItem('sj_loggedIn', 'true');
    window.location.href = 'index.html';
  });
  </script>
</body>
</html>
